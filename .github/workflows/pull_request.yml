name: pull request checks

on:
  pull_request:
    branches: ['*']

jobs:
  build-lint-test:
    name: Build, lint, test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.23']
    steps:
    - name: install make
      run: sudo apt-get install make
    - name: set up go 1.x
      uses: actions/setup-go@v3
      with:
        go-version: ${{ matrix.go }}
    - name: checkout
      uses: actions/checkout@v3
    - name: check format
      run: make fmt && git add -A && git diff --exit-code
    - name: build, lint, test
      run: make build lint test
    - name: check clean vendors
      run: go mod vendor
    - name: Report coverage
      if: ${{ matrix.go == '1.23' }}
      uses: codecov/codecov-action@v4
      with:
        files: ./cover.out
        flags: unittests
        fail_ci_if_error: false
        verbose: true

  bundle-check:
    runs-on: ubuntu-latest
    name: Checking bundle up-to-date
    steps:
    - name: install make
      run: sudo apt-get install make
    - name: checkout
      uses: actions/checkout@v3
    - name: generate bundle
      run: make update-bundle
    - name: check bundle clean state
      run: git add -A && git diff HEAD -I "operator-sdk-v" --exit-code

  helm-check:
    runs-on: ubuntu-latest
    name: Checking helm up-to-date and valid
    steps:
    - name: install make
      run: sudo apt-get install make

    - name: checkout
      uses: actions/checkout@v3

    - name: generate helm
      run: make helm-update

    - name: check helm clean state
      run: git add -A && git diff HEAD --exit-code

    - name: set up Helm
      uses: azure/setup-helm@v4.2.0
      with:
        version: v3.17.0

    - uses: actions/setup-python@v5.3.0
      with:
        python-version: '3.x'
        check-latest: true

    - name: set up chart-testing
      uses: helm/chart-testing-action@v2.7.0

    - name: run chart-testing (list-changed)
      id: list-changed
      run: |
        changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
        if [[ -n "$changed" ]]; then
          echo "changed=true" >> "$GITHUB_OUTPUT"
        fi

    - name: run chart-testing (lint)
      if: steps.list-changed.outputs.changed == 'true'
      run: ct lint --target-branch ${{ github.event.repository.default_branch }}

    - name: create kind cluster
      if: steps.list-changed.outputs.changed == 'true'
      uses: helm/kind-action@v1.12.0

    - name: run chart-testing (install)
      if: steps.list-changed.outputs.changed == 'true'
      run: ct install --target-branch ${{ github.event.repository.default_branch }}
